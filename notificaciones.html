<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Enviar notificaciones a ganadores - La Academia del Fade">
    <title>Notificaciones | La Academia del Fade</title>
    <link rel="stylesheet" href="assets/vendors/themify-icons/css/themify-icons.css">
    <link rel="stylesheet" href="assets/css/johndoe.css">
</head>

<body data-spy="scroll" data-target=".navbar" data-offset="40" id="home">

    <nav class="navbar sticky-top navbar-expand-lg navbar-light bg-white" data-spy="affix" data-offset-top="510">
        <div class="container">
            <button class="navbar-toggler ml-auto" type="button" data-toggle="collapse"
                data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse mt-sm-20 navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item"><a href="index.html" class="nav-link">Inicio</a></li>
                    <li class="nav-item"><a href="index.html#about" class="nav-link">Acerca</a></li>
                    <li class="nav-item"><a href="index.html#resume" class="nav-link">Barberos</a></li>
                    <li class="nav-item"><a href="index.html#portfolio" class="nav-link">Portafolio</a></li>
                    <li class="nav-item"><a href="eventos.html" class="nav-link">Eventos</a></li>
                    <li class="nav-item"><a href="index.html#contact" class="nav-link">Contacto</a></li>
                </ul>
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item ml-2"><a href="login.html" class="btn btn-danger btn-sm">Iniciar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="section bg-custom-gray py-5">
        <div class="container">
            <h2 class="mb-4"><span class="text-danger">Notificaciones</span> para Ganadores</h2>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <p class="text-muted">Completa el formulario para enviar un mensaje personalizado a los
                                ganadores.</p>
                            <form id="notificacionForm" class="needs-validation" novalidate>
                                <div class="form-group">
                                    <label for="ganadorNombre" class="font-weight-bold">Nombre del Ganador</label>
                                    <input id="ganadorNombre" type="text" class="form-control"
                                        placeholder="Nombre completo" required>
                                    <div class="invalid-feedback">Ingresa el nombre del ganador.</div>
                                </div>
                                <div class="form-group mt-3">
                                    <label for="encabezado" class="font-weight-bold">Encabezado</label>
                                    <input id="encabezado" type="text" class="form-control"
                                        placeholder="Felicidades por tu logro" required>
                                    <div class="invalid-feedback">Ingresa un encabezado.</div>
                                </div>
                                <div class="form-group mt-3">
                                    <label for="mensaje" class="font-weight-bold">Mensaje</label>
                                    <textarea id="mensaje" class="form-control" rows="5"
                                        placeholder="Escribe aquí un mensaje personalizado" required></textarea>
                                    <div class="invalid-feedback">Ingresa un mensaje.</div>
                                </div>
                                <button type="submit" class="btn btn-danger btn-block mt-4">Enviar Notificación</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="section bg-dark text-white py-4">
        <div class="container text-center">
            <a href="eventos.html" class="btn btn-light">Volver a Eventos</a>
        </div>
    </section>

    <script>
        document.getElementById('notificacionForm').addEventListener('submit', function (e) {
            e.preventDefault();

            if (!this.checkValidity()) {
                this.classList.add('was-validated');
                return;
            }

            var ganador = document.getElementById('ganadorNombre').value.trim();
            var encabezado = document.getElementById('encabezado').value.trim();
            var mensaje = document.getElementById('mensaje').value.trim();

            alert('Notificación preparada para ' + ganador + '\n\n' + encabezado + '\n' + mensaje);
            this.reset();
            this.classList.remove('was-validated');
        });
    </script>

</body>

</html>
