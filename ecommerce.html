    <section class="section bg-custom-gray py-5">
        <div class="container">
            <h2 class="mb-4"><span class="text-danger">Shop</span> Barbería</h2>
            <p>Productos y carrito de compras con pasarela de pago.</p>

            <div class="form-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar producto por nombre...">
            </div>

            <div class="row" id="productList"></div>

            <div class="card mt-4 shadow-sm">
                <div class="card-body">
                    <h4>Carrito</h4>
                    <div id="cartItems"></div>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <strong>Total: $<span id="cartTotal">0.00</span></strong>
                        <button id="checkoutBtn" class="btn btn-danger">Pagar</button>
                    </div>
                    <div id="checkoutMessage" class="mt-3"></div>
                </div>
            </div>

        </div>
    </section>

    <script>
        const products = [
            { id: 1, name: 'Aceite para Barba Premium', price: 35000, description: 'Nutre y suaviza la barba.', image: 'assets/imgs/producto1.jpg' },
            { id: 2, name: 'Cera de Estilo Firme', price: 28000, description: 'Fijación duradera con brillo natural.', image: 'assets/imgs/producto2.jpg' },
            { id: 3, name: 'Champú 2 en 1 Barbería', price: 24000, description: 'Limpieza y acondicionador en un solo paso.', image: 'assets/imgs/producto3.jpg' },
            { id: 4, name: 'Set de Cuchillas de Repuesto', price: 19000, description: '5 cuchillas de alta precisión.', image: 'assets/imgs/producto4.jpg' }
        ];
        let cart = [];

        function formatCurrency(value) {
            return value.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        let currentProducts = [...products];

        function renderProducts(items) {
            const container = document.getElementById('productList');
            container.innerHTML = '';
            (items || currentProducts).forEach(p => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-3';
                col.innerHTML = `
            <div class="card mb-4">
                <img src="${p.image}" class="card-img-top" alt="${p.name}" style="height: 170px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title">${p.name}</h5>
                    <p class="card-text">${p.description}</p>
                    <p class="font-weight-bold">$ ${formatCurrency(p.price)}</p>
                    <button class="btn btn-danger btn-sm w-100" data-id="${p.id}">Agregar al carrito</button>
                </div>
            </div>
        `;
                container.appendChild(col);
            });
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            cartItems.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                cartItems.innerHTML = '<p>El carrito está vacío.</p>';
            }

            cart.forEach(item => {
                const row = document.createElement('div');
                row.className = 'd-flex justify-content-between align-items-center mb-2';
                row.innerHTML = `
            <div>
                <strong>${item.name}</strong> x ${item.quantity}
            </div>
            <div>
                $ ${formatCurrency(item.price * item.quantity)}
                <button class="btn btn-sm btn-link text-danger remove-item" data-id="${item.id}">Eliminar</button>
            </div>
        `;
                cartItems.appendChild(row);
                total += item.price * item.quantity;
            });

            document.getElementById('cartTotal').innerText = formatCurrency(total);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existing = cart.find(i => i.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            renderCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.id !== productId);
            renderCart();
        }

        function setupEvents() {
            document.getElementById('productList').addEventListener('click', function (e) {
                if (e.target.matches('button[data-id]')) {
                    addToCart(parseInt(e.target.getAttribute('data-id'), 10));
                }
            });

            document.getElementById('cartItems').addEventListener('click', function (e) {
                if (e.target.matches('.remove-item')) {
                    removeFromCart(parseInt(e.target.getAttribute('data-id'), 10));
                }
            });

            document.getElementById('checkoutBtn').addEventListener('click', function () {
                if (cart.length === 0) {
                    document.getElementById('checkoutMessage').innerHTML = '<div class="alert alert-warning">Agrega productos primero.</div>';
                    return;
                }
                const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
                document.getElementById('checkoutMessage').innerHTML = `<div class="alert alert-success">Pago completado por $ ${formatCurrency(total)}. ¡Gracias por tu compra!</div>`;
                cart = [];
                renderCart();
            });
        }

        renderProducts(currentProducts);
        renderCart();
        setupEvents();

        // Filtro de búsqueda por nombre
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function () {
            const query = this.value.trim().toLowerCase();
            currentProducts = products.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(currentProducts);
        });
    </script>

</body>
