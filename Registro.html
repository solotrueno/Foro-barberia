<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - La Academia del Fade</title>

<link rel="stylesheet" href="assets/css/johndoe.css">

<style>
body{
    background:#111;
}

.registro-card{
    margin-top:80px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card registro-card shadow">
<div class="card-body p-4">

<h3 class="text-center mb-4">Crear Cuenta 💈</h3>

<form id="registroForm">

<div class="form-group">
<label>Nombre</label>
<input type="text" class="form-control" id="nombre" required>
</div>
<input type="file" class="form-control" id="fotoPerfil" accept="image/*">
<div class="form-group">
<label>Correo</label>
<input type="email" class="form-control" id="correo" required>
</div>

<div class="form-group">
<label>Contraseña</label>
<input type="password" class="form-control" id="password" required>
</div>

<div class="form-group">
<label>Foto de Perfil</label>
<input type="file" class="form-control">
</div>

<button class="btn btn-danger btn-block">
Registrarse
</button>

<div class="text-center mt-3">
<a href="login.html">Ya tengo cuenta</a>
</div>

</form>

<div id="mensajeRegistro" class="mt-3 text-center"></div>

</div>
</div>

</div>
</div>
</div>



<script>
document.getElementById("registroForm").addEventListener("submit", function(e){
    e.preventDefault();

    var nombre = document.getElementById("nombre").value;
    var correo = document.getElementById("correo").value;
    var password = document.getElementById("password").value;
    var foto = document.getElementById("fotoPerfil").files[0];

    var reader = new FileReader();

    reader.onload = function(e){

        var usuario = {
            nombre: nombre,
            correo: correo,
            password: password,
            foto: e.target.result
        };

        localStorage.setItem("usuario", JSON.stringify(usuario));

        document.getElementById("mensajeRegistro").innerHTML =
        "<span style='color:green'>Cuenta creada ✔</span>";

        setTimeout(function(){
            window.location.href="login.html";
        },1500);
    }

    if(foto){
        reader.readAsDataURL(foto);
    }

});
</script>

    // guardar usuario
    localStorage.setItem("usuario", JSON.stringify(usuario));

    document.getElementById("mensajeRegistro").innerHTML =
    "<span style='color:green'>Cuenta creada correctamente ✔</span>";

    setTimeout(function(){
        window.location.href = "login.html";
    },2000);

});

</script>

</body>
</html>
