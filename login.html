<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - La Academia del Fade</title>

<link rel="stylesheet" href="assets/css/johndoe.css">

<style>

body{
    background:#111;
}

.login-card{
    margin-top:100px;
    border-radius:15px;
}

</style>
</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-5">

<div class="card login-card shadow">
<div class="card-body p-4">

<h3 class="text-center mb-4">Iniciar Sesión 💈</h3>

<form id="loginForm">

<div class="form-group">
<label>Correo</label>
<input type="email" class="form-control" id="correo" required>
</div>

<div class="form-group">
<label>Contraseña</label>
<input type="password" class="form-control" id="password" required>
</div>

<div class="form-group">
<label>Tipo de Usuario</label>

<select class="form-control" id="tipoUsuario">
<option value="cliente">Cliente</option>
<option value="barbero">Barbero</option>
<option value="admin">Administrador</option>
</select>

</div>

<button type="submit" class="btn btn-danger btn-block">
Entrar
</button>

<div class="text-center mt-3">
<a href="registro.html">Crear cuenta</a>
</div>

</form>

<div id="mensajeLogin" class="text-center mt-3"></div>

</div>
</div>

</div>
</div>
</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

var correo = document.getElementById("correo").value;
var password = document.getElementById("password").value;
var tipo = document.getElementById("tipoUsuario").value;

var usuario = JSON.parse(localStorage.getItem("usuario"));

/* CLAVE SECRETA ADMIN */
var claveAdmin = "admin123";

if(usuario && correo === usuario.correo && password === usuario.password){

    /* SI ES ADMIN PEDIR CLAVE */
    if(tipo === "admin"){

        var claveIngresada = prompt("Ingrese la clave especial de administrador");

        if(claveIngresada !== claveAdmin){

            document.getElementById("mensajeLogin").innerHTML =
            "<span style='color:red'>Clave de administrador incorrecta</span>";

            return;
        }

    }

    /* GUARDAR SESIÓN */
    localStorage.setItem("sesionActiva", true);
    localStorage.setItem("tipoUsuario", tipo);
    localStorage.setItem("usuario", JSON.stringify(usuario));

    window.location.href="index.html";

}else{

    document.getElementById("mensajeLogin").innerHTML =
    "<span style='color:red'>Correo o contraseña incorrectos</span>";

}

});

</script>

</body>
</html>
