<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - La Academia del Fade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="assets/css/johndoe.css">
    <link rel="stylesheet" href="assets/vendors/themify-icons/css/themify-icons.css">

    <style>
        body {
            background: #111;
        }

        .login-card {
            margin-top: 100px;
            border-radius: 15px;
        }

        .login-title {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card shadow">
                <div class="card-body p-4">
                    
                    <h3 class="text-center login-title mb-4">
                        💈 La Academia del Fade
                    </h3>

                    <form id="loginForm">
                        <div class="form-group">
                            <label>Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" placeholder="Ingresa tu correo" required>
                        </div>

                        <div class="form-group">
                            <label>Contraseña</label>
                            <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
                        </div>

                        <button type="submit" class="btn btn-danger btn-block">
                            Ingresar
                        </button>

                        <div class="text-center mt-3">
                            <a href="index.html">← Volver al Inicio</a>
                        </div>
                    </form>

                    <div id="loginMessage" class="mt-3 text-center"></div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    var message = document.getElementById("loginMessage");

    // Usuario de prueba
    if(email === "admin@fade.com" && password === "123456") {
        message.innerHTML = "<span style='color:green;'>Bienvenido 💈🔥</span>";
    } else {
        message.innerHTML = "<span style='color:red;'>Correo o contraseña incorrectos</span>";
    }
});
</script>

</body>
</html>
